services:
  kafka:
    image: apache/kafka:3.7.0
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
      - "9094:9094"

  postgres:
    image: postgres:15-alpine
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    env_file: .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  api_service:
    build: ./api_service
    env_file: .env
    depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy

  kafka_producer:
    build:
      context: .
      dockerfile: ./kafka_producer/Dockerfile
    env_file: .env
    depends_on:
        kafka:
          condition: service_healthy
    volumes:
      - ./data:/app/data

  kafka_consumer:
    build:
      context: .
      dockerfile: ./kafka_consumer/Dockerfile
    env_file: .env
    depends_on:
        kafka:
          condition: service_healthy
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy

  spark_processor:
    build:
      context: .
      dockerfile: ./spark_processor/Dockerfile
    env_file: .env
    depends_on:
        kafka:
          condition: service_healthy
        postgres:
          condition: service_healthy

  ml_pipeline:
    build: ./ml_pipeline
    env_file: .env
    depends_on:
        postgres:
          condition: service_healthy

  mlflow:
  image: ghcr.io/mlflow/mlflow:v2.12.2
  ports:
    - "5001:5000"
  command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db
    - mlflow_data:/mlflow

volumes:
  postgres_data:
